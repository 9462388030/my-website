<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amazon Cart with Images</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f3f3f3;
    }

    header {
        background: #131921;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }

    .container {
        display: flex;
        gap: 20px;
        padding: 20px;
    }

    .products, .cart {
        background: white;
        padding: 15px;
        border-radius: 8px;
        width: 50%;
    }

    .product {
        border-bottom: 1px solid #ddd;
        padding: 15px 0;
        text-align: center;
    }

    .product img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin-bottom: 10px;
    }

    button {
        background: #ff9900;
        border: none;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 5px;
        margin-top: 5px;
    }

    button:hover {
        background: #e68a00;
    }

    .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 10px;
    }

    .cart-item img {
        width: 50px;
        height: 50px;
        object-fit: contain;
        margin-right: 10px;
    }

    .item-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    input {
        width: 50px;
    }

    .total {
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>

<body>

<header>Amazon Cart with Images</header>

<div class="container">

    <!-- PRODUCTS -->
    <div class="products">
        <h2>Products</h2>

        <div class="product">
            <img src="https://m.media-amazon.com/images/I/71r69Y7BSeL._AC_UY218_.jpg">
            <h3>Headphones</h3>
            <p>₹1000</p>
            <button onclick="addToCart('Headphones', 1000, 'https://m.media-amazon.com/images/I/71r69Y7BSeL._AC_UY218_.jpg')">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://m.media-amazon.com/images/I/61Id6WJDWqL._AC_UY218_.jpg">
            <h3>Smartphone</h3>
            <p>₹15000</p>
            <button onclick="addToCart('Smartphone', 15000, 'https://m.media-amazon.com/images/I/61Id6WJDWqL._AC_UY218_.jpg')">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://m.media-amazon.com/images/I/71TPda7cwUL._AC_UY218_.jpg">
            <h3>Laptop</h3>
            <p>₹50000</p>
            <button onclick="addToCart('Laptop', 50000, 'https://m.media-amazon.com/images/I/71TPda7cwUL._AC_UY218_.jpg')">
                Add to Cart
            </button>
        </div>
    </div>

    <!-- CART -->
    <div class="cart">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>
        <div class="total" id="total">Total: ₹0</div>
    </div>

</div>

<script>
let cart = [];

function addToCart(name, price, image) {
    let item = cart.find(p => p.name === name);

    if (item) {
        item.qty += 1;
    } else {
        cart.push({ name, price, qty: 1, image });
    }

    renderCart();
}

function removeItem(name) {
    cart = cart.filter(item => item.name !== name);
    renderCart();
}

function updateQty(name, qty) {
    let item = cart.find(p => p.name === name);
    if (item) {
        item.qty = parseInt(qty);
        if (item.qty <= 0) removeItem(name);
    }
    renderCart();
}

function renderCart() {
    let container = document.getElementById("cartItems");
    container.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        total += item.price * item.qty;

        container.innerHTML += `
            <div class="cart-item">
                <div class="item-left">
                    <img src="${item.image}">
                    <div>
                        <b>${item.name}</b><br>
                        ₹${item.price}
                    </div>
                </div>

                <div>
                    Qty:
                    <input type="number" value="${item.qty}" min="1"
                        onchange="updateQty('${item.name}', this.value)">
                    <button onclick="removeItem('${item.name}')">Remove</button>
                </div>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}
</script>

</body>
</html>
